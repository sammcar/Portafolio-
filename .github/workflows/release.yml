name: Release

# Runs after every push to main: semantic-release reads Conventional
# Commits, computes the next SemVer version, updates CHANGELOG.md,
# tags and publishes a GitHub Release. No manual steps.
on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so commit analysis works

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Align npm with local (lockfile v11 compat)
        run: npm install -g npm@11

      - run: npm ci

      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUSKY: 0
        run: npx semantic-release
